services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: custom-shields-creator
    ports:
      - "5000:5000"
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=5000
      - FLASK_DEBUG=0
      - SECRET_KEY=${SECRET_KEY:-change-me}
    restart: unless-stopped
